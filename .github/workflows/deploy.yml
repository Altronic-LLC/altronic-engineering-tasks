name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Test
        # Project standard is 100% unit-test coverage; tests must pass to
        # deploy. The vitest coverage threshold is intentionally off until
        # the existing codebase is backfilled — once that lands, switch on
        # the thresholds in vite.config.ts and add `-- --coverage` here.
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build-time env vars. These get baked into the static bundle.
          # GitHub repo Settings → Secrets and variables → Actions is where
          # you set these. Mock mode is the safe default for first deploys.
          VITE_USE_MOCK: ${{ vars.VITE_USE_MOCK || 'true' }}
          VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ vars.VITE_AZURE_TENANT_ID }}
          VITE_SP_SITE_ID: ${{ vars.VITE_SP_SITE_ID }}
          VITE_SP_LIST_ID: ${{ vars.VITE_SP_LIST_ID }}
          VITE_SP_PROJECTS_LIST_ID: ${{ vars.VITE_SP_PROJECTS_LIST_ID }}
          VITE_SP_TEST_RESULTS_LIST_ID: ${{ vars.VITE_SP_TEST_RESULTS_LIST_ID }}

      - name: Add 404 fallback for client-side routing
        # GitHub Pages serves /404.html for any unmatched path. Copying
        # index.html to 404.html means the SPA's client-side router still
        # picks up the URL on a hard refresh of e.g. /task/15.
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
